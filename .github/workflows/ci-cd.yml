name: CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - "release/**"
      - "master"
  pull_request:
    branches:
      - "master"
      - "**"
    types: [opened, synchronize, reopened]

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: rustup component add rustfmt
      - name: Run Fmt Check
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: rustup component add clippy
      - name: Run clippy
        run: cargo clippy -- -D warnings -A clippy::uninlined_format_args

  test:
    name: Tests
    runs-on: ubuntu-22.04
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install OpenSSL development libraries
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libssl-dev pkg-config

      - name: Run tests
        run: cargo test --exclude rindexer_rust_playground --workspace --release --features jemalloc

      - name: Run tests (reth feature)
        run: cargo test --exclude rindexer_rust_playground --workspace --release --features jemalloc,reth

  build:
    name: Build ${{ matrix.arch }}
    if: |
      github.event_name != 'pull_request' &&
      github.actor != 'github-actions[bot]' &&
      startsWith(github.ref, 'refs/heads/release/')
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            svm_target_platform: linux-amd64
            arch: amd64
          - runner: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            svm_target_platform: linux-amd64
            arch: arm64

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Linux ARM setup
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc-aarch64-linux-gnu libssl-dev pkg-config
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV

      - name: Install OpenSSL development libraries
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libssl-dev pkg-config

      - name: Build binaries
        working-directory: cli
        env:
          SVM_TARGET_PLATFORM: ${{ matrix.svm_target_platform }}
        run: |
          set -eo pipefail
          target="${{ matrix.target }}"
          flags=()

          if [[ "$target" != "aarch64-unknown-linux-gnu" ]]; then
            flags+=(--features jemalloc,reth)
          else
            flags+=(--features reth)
          fi

          RUST_BACKTRACE=1 cargo build --release --target "$target" "${flags[@]}" -vv

      - name: Smoke Test
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          set -eo pipefail
          binary_path="${{ github.workspace }}/target/${{ matrix.target }}/release/rindexer_cli"
          "$binary_path" --version
          "$binary_path" help

      - name: Archive binaries
        id: artifacts
        env:
          TARGET: ${{ matrix.target }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -eo pipefail
          BUILD_DIR="${{ github.workspace }}/target/${TARGET}/release"
          STAGING_DIR="staging"
          mkdir -p "$STAGING_DIR"
          cp "$BUILD_DIR/rindexer_cli" "$STAGING_DIR/"

          FILE_NAME="rindexer_linux-${ARCH}.tar.gz"
          tar -czvf "$FILE_NAME" -C "$STAGING_DIR" .
          echo "file_name=$FILE_NAME" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: ${{ steps.artifacts.outputs.file_name }}

  create_pr:
    name: Create Release PR
    runs-on: ubuntu-22.04
    needs: build
    if: |
      github.actor != 'github-actions[bot]' &&
      startsWith(github.ref, 'refs/heads/release/')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Extract version from branch name
        run: |
          VERSION=${GITHUB_REF#refs/heads/release/}
          echo "VERSION_NAME=$VERSION" >> $GITHUB_ENV

      - name: Update Cargo.toml versions
        run: |
          sed -i 's/^version = ".*"/version = "${{ env.VERSION_NAME }}"/' cli/Cargo.toml
          sed -i 's/^version = ".*"/version = "${{ env.VERSION_NAME }}"/' core/Cargo.toml

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add cli/Cargo.toml core/Cargo.toml
          git commit -m "Release v${{ env.VERSION_NAME }}" || echo "No changes to commit"
          git push origin release/${{ env.VERSION_NAME }}

      - name: Check if PR already exists
        id: check_pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_EXISTS=$(gh pr list --base master --head release/${{ env.VERSION_NAME }} --json number --jq length)
          if [ "$PR_EXISTS" -gt 0 ]; then
            echo "pr_exists=true" >> $GITHUB_OUTPUT
          else
            echo "pr_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check_pr.outputs.pr_exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Release v${{ env.VERSION_NAME }}" \
            --body "## Release v${{ env.VERSION_NAME }}

          This PR contains:
          - Version bump to ${{ env.VERSION_NAME }}

          **Merging this PR will automatically create a GitHub Release with binaries.**" \
            --base master \
            --head release/${{ env.VERSION_NAME }}

  release_build:
    name: Release Build ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    if: |
      github.actor != 'github-actions[bot]' &&
      github.ref == 'refs/heads/master' &&
      github.event_name == 'push'
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            svm_target_platform: linux-amd64
            arch: amd64
          - runner: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            svm_target_platform: linux-amd64
            arch: arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if this is a release commit
        id: check_release
        run: |
          RECENT_COMMIT_MSG=$(git log --oneline -1 --pretty=format:"%s")
          VERSION_FROM_RELEASE=$(echo "$RECENT_COMMIT_MSG" | grep -o 'Release v[0-9]*\.[0-9]*\.[0-9]*' | sed 's/Release v//' || echo "")
          if [[ -n "$VERSION_FROM_RELEASE" ]]; then
            echo "VERSION_NAME=$VERSION_FROM_RELEASE" >> $GITHUB_ENV
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout release branch
        if: steps.check_release.outputs.is_release == 'true'
        uses: actions/checkout@v4
        with:
          ref: release/${{ env.VERSION_NAME }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        if: steps.check_release.outputs.is_release == 'true'
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        if: steps.check_release.outputs.is_release == 'true'
        with:
          key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Setup Node.js
        if: steps.check_release.outputs.is_release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Linux ARM setup
        if: steps.check_release.outputs.is_release == 'true' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc-aarch64-linux-gnu libssl-dev pkg-config
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
          echo "PKG_CONFIG_LIBDIR=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV

      - name: Install OpenSSL development libraries
        if: steps.check_release.outputs.is_release == 'true' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libssl-dev pkg-config

      - name: Build binaries
        if: steps.check_release.outputs.is_release == 'true'
        working-directory: cli
        env:
          SVM_TARGET_PLATFORM: ${{ matrix.svm_target_platform }}
        run: |
          set -eo pipefail
          target="${{ matrix.target }}"
          flags=()

          if [[ "$target" != "aarch64-unknown-linux-gnu" ]]; then
            flags+=(--features jemalloc,reth)
          else
            flags+=(--features reth)
          fi

          RUST_BACKTRACE=1 cargo build --release --target "$target" "${flags[@]}" -vv

      - name: Smoke Test
        if: steps.check_release.outputs.is_release == 'true' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          set -eo pipefail
          binary_path="${{ github.workspace }}/target/${{ matrix.target }}/release/rindexer_cli"
          "$binary_path" --version
          "$binary_path" help

      - name: Archive binaries
        if: steps.check_release.outputs.is_release == 'true'
        id: artifacts
        env:
          TARGET: ${{ matrix.target }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -eo pipefail
          BUILD_DIR="${{ github.workspace }}/target/${TARGET}/release"
          STAGING_DIR="staging"
          mkdir -p "$STAGING_DIR"
          cp "$BUILD_DIR/rindexer_cli" "$STAGING_DIR/"

          FILE_NAME="rindexer_linux-${ARCH}.tar.gz"
          tar -czvf "$FILE_NAME" -C "$STAGING_DIR" .
          echo "file_name=$FILE_NAME" >> $GITHUB_OUTPUT

      - name: Upload artifact
        if: steps.check_release.outputs.is_release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ matrix.arch }}
          path: ${{ steps.artifacts.outputs.file_name }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: release_build
    if: |
      github.actor != 'github-actions[bot]' &&
      github.ref == 'refs/heads/master' &&
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if this is a release commit
        id: check_release
        run: |
          RECENT_COMMIT_MSG=$(git log --oneline -1 --pretty=format:"%s")
          VERSION_FROM_RELEASE=$(echo "$RECENT_COMMIT_MSG" | grep -o 'Release v[0-9]*\.[0-9]*\.[0-9]*' | sed 's/Release v//' || echo "")
          if [[ -n "$VERSION_FROM_RELEASE" ]]; then
            echo "VERSION_NAME=$VERSION_FROM_RELEASE" >> $GITHUB_ENV
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Download release artifacts
        if: steps.check_release.outputs.is_release == 'true'
        uses: actions/download-artifact@v4
        with:
          path: ./release-artifacts

      - name: Create GitHub Release
        if: steps.check_release.outputs.is_release == 'true'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ env.VERSION_NAME }}
          release_name: Release v${{ env.VERSION_NAME }}
          draft: false
          prerelease: false
          body: |
            Release v${{ env.VERSION_NAME }}

            ## Installation
            ```bash
            curl -L https://rindexer.xyz/install.sh | bash -s -- --version ${{ env.VERSION_NAME }}
            ```
        continue-on-error: true

      - name: Upload Release Assets
        if: steps.check_release.outputs.is_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for platform_dir in ./release-artifacts/*/; do
            for file in "$platform_dir"*; do
              if [[ -f "$file" ]]; then
                filename=$(basename "$file")
                echo "Uploading $filename"
                gh release upload v${{ env.VERSION_NAME }} "$file" --clobber
              fi
            done
          done
